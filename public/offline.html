<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#fdf8f4">
  <title>Sin conexión — Suspiro Nupcial</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    body{
      font-family:'Inter',system-ui,-apple-system,sans-serif;
      background:#fdf8f4;
      min-height:100dvh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:1.5rem;
      color:#1e293b;
    }
    .container{
      max-width:420px;
      width:100%;
      text-align:center;
      animation:fadeIn .6s ease-out;
    }
    @keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .icon-wrap{
      width:96px;height:96px;
      margin:0 auto 2rem;
      background:linear-gradient(135deg,#fecdd3,#fef3c7);
      border-radius:2rem;
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 8px 24px rgba(244,63,94,.12);
    }
    .icon-wrap svg{width:48px;height:48px;color:#f43f5e}
    h1{
      font-size:1.75rem;font-weight:700;
      margin-bottom:.75rem;
      background:linear-gradient(135deg,#f43f5e,#f59e0b);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
    }
    p{color:#64748b;line-height:1.7;margin-bottom:2rem;font-size:.95rem}
    .btn{
      display:inline-flex;align-items:center;gap:.5rem;
      background:linear-gradient(135deg,#f43f5e,#f59e0b);
      color:#fff;font-weight:600;font-size:.9rem;
      padding:.875rem 2rem;border-radius:1rem;
      border:none;cursor:pointer;
      box-shadow:0 8px 20px rgba(244,63,94,.25);
      transition:all .3s ease;
      text-decoration:none;
    }
    .btn:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(244,63,94,.35)}
    .btn:active{transform:translateY(0)}
    .btn svg{width:18px;height:18px}
    .brand{
      margin-top:3rem;
      font-size:.75rem;color:#94a3b8;
      letter-spacing:.1em;text-transform:uppercase;
    }
    .status-dot{
      display:inline-block;width:8px;height:8px;
      background:#ef4444;border-radius:50%;
      margin-right:.5rem;animation:pulse 2s infinite;
    }
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>

    <h1>Estás sin conexión</h1>

    <p>
      <span class="status-dot"></span>
      No pudimos conectar con Suspiro Nupcial. Revisa tu conexión a internet e intenta de nuevo.
    </p>

    <button class="btn" onclick="tryReconnect()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Reintentar
    </button>

    <div class="brand">Suspiro Nupcial</div>
  </div>

  <script>
    function tryReconnect() {
      if (navigator.onLine) {
        window.location.reload();
      } else {
        const btn = document.querySelector('.btn');
        const original = btn.innerHTML;
        btn.innerHTML = '<span>Aún sin conexión...</span>';
        btn.style.opacity = '0.7';
        setTimeout(() => {
          btn.innerHTML = original;
          btn.style.opacity = '1';
        }, 2000);
      }
    }

    // Auto-reload when connection is restored
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
